<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard VCC · Invermar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0D2257;
    --blue:   #1A4DAA;
    --sky:    #3A7BD5;
    --wave:   #5B9CEC;
    --light:  #EEF4FB;
    --border: #D5E3F5;
    --text:   #1A2840;
    --muted:  #6B85A8;
    --green:  #22C55E;
    --yellow: #F59E0B;
    --orange: #F97316;
    --red:    #EF4444;
    --white:  #FFFFFF;
    --shadow: 0 1px 4px rgba(13,34,87,.08), 0 4px 16px rgba(13,34,87,.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #F5F8FF;
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(13,34,87,.07);
  }
  .logo-wrap img { height: 38px; display: block; }
  .header-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: .4px;
  }
  .header-update {
    font-size: 11.5px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .update-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }

  /* ── LAYOUT ── */
  main { max-width: 1300px; margin: 0 auto; padding: 28px 24px 48px; }

  /* ── SECTION LABELS ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-left: 3px;
  }

  /* ── GRID ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    box-shadow: var(--shadow);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--navy);
  }
  .card-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--light);
    color: var(--blue);
  }

  /* ── KPI STRIP ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(13,34,87,.1); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-color, var(--blue));
  }
  .kpi-month { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .kpi-pct { font-size: 34px; font-weight: 700; line-height: 1; color: var(--kpi-color, var(--navy)); font-family: 'DM Sans', sans-serif; }
  .kpi-sub { font-size: 11.5px; color: var(--muted); margin-top: 5px; font-family: 'DM Mono', monospace; }
  .kpi-delta { font-size: 11px; font-weight: 600; margin-top: 6px; }
  .delta-up { color: var(--green); } .delta-down { color: var(--red); }

  /* ── BAR CHART (tendencia) ── */
  .bar-chart-wrap { padding: 0 4px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 18px; height: 140px; padding: 0 8px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar-outer { width: 100%; background: var(--light); border-radius: 8px 8px 0 0; position: relative; display: flex; flex-direction: column; justify-content: flex-end; }
  .bar-fill {
    width: 100%; border-radius: 8px 8px 0 0;
    transition: height .8s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .bar-fill::after {
    content: attr(data-val);
    position: absolute;
    top: -22px; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .bar-label { font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
  .bar-sub { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* ── PROGRESS BARS ── */
  .prog-list { display: flex; flex-direction: column; gap: 11px; }
  .prog-row { display: flex; flex-direction: column; gap: 4px; }
  .prog-meta { display: flex; justify-content: space-between; align-items: center; }
  .prog-name { font-size: 12.5px; font-weight: 500; color: var(--text); }
  .prog-val  { font-size: 11.5px; font-family: 'DM Mono', monospace; color: var(--muted); font-weight: 500; }
  .prog-track { height: 7px; background: var(--light); border-radius: 99px; overflow: hidden; }
  .prog-bar {
    height: 100%; border-radius: 99px;
    transition: width 1s cubic-bezier(.34,1.56,.64,1);
  }

  /* ── TABLE ── */
  .filter-row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px;
  }
  .filter-row input, .filter-row select {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color .2s;
  }
  .filter-row input:focus, .filter-row select:focus { border-color: var(--sky); }
  .filter-row input { width: 200px; }
  .count-badge {
    margin-left: auto;
    font-size: 11.5px; font-weight: 600;
    color: var(--blue);
    background: var(--light);
    border-radius: 20px;
    padding: 4px 10px;
  }

  .tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1.5px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead { background: var(--navy); }
  thead th { color: var(--white); font-weight: 600; padding: 11px 14px; text-align: left; letter-spacing: .3px; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--light); }
  tbody td { padding: 10px 14px; vertical-align: middle; }
  .td-code { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 11.5px; }
  .td-name { font-weight: 500; color: var(--text); }
  .td-sec { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: var(--light); color: var(--blue); white-space: nowrap; }
  .td-cargo { color: var(--muted); font-size: 11.5px; }

  /* month pills */
  .pill { display: inline-block; width: 36px; text-align: center; padding: 3px 0; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .pill-si { background: #DCFCE7; color: #15803D; }
  .pill-no { background: #FEE2E2; color: #B91C1C; }

  /* total dots */
  .dots { display: flex; gap: 3px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot-si { background: var(--green); }
  .dot-no { background: #E2E8F0; }
  .dots-label { font-size: 11.5px; font-weight: 700; color: var(--text); margin-left: 6px; font-family: 'DM Mono', monospace; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .kpi-strip { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 520px) {
    .kpi-strip { grid-template-columns: 1fr 1fr; }
    header { padding: 0 16px; }
    main { padding: 16px 12px 40px; }
  }
</style>
</head>

  const totals = months.map(m => {
    const si = data.filter(r=>r[m]==='SI').length;
    return {m, si, pct: Math.round(si/data.length*100)};
  });
  const maxPct = 100;
  const chartH = 140;

  const chart = document.getElementById('barChart');
  chart.innerHTML = '';

  totals.forEach((t,i) => {
    const barH = Math.max(4, Math.round((t.pct/maxPct)*chartH));
    const prev = i>0 ? totals[i-1].pct : null;
    let delta = '';
    if(prev !== null) {
      const d = t.pct - prev;
      delta = `<span class="kpi-delta ${d>=0?'delta-up':'delta-down'}">${d>=0?'▲':'▼'} ${Math.abs(d)}pp</span>`;
    }
    const col = document.createElement('div');
    col.className = 'bar-col';
    col.innerHTML = `
      <div class="bar-outer" style="height:${chartH}px; width:100%;">
        <div class="bar-fill" data-val="${t.pct}%"
          style="height:${barH}px; background:${barColor(t.pct)}; width:100%;"></div>
      </div>
      <div class="bar-label">${monthLabels[t.m]}</div>
      <div class="bar-sub" style="font-size:10px; color:#6B85A8;">${t.si}/${data.length}</div>
      ${delta}
    `;
    chart.appendChild(col);
  });
}

// ── PROGRESS BARS ─────────────────────────────────────────────
function pctBar(container, rows, key) {
  const groups = {};
  rows.forEach(r => {
    if(!groups[r[key]]) groups[r[key]] = {si:0, total:0};
    groups[r[key]].total++;
    if(r.abril==='SI') groups[r[key]].si++;
  });
  const sorted = Object.entries(groups).sort((a,b)=>b[1].si/b[1].total - a[1].si/a[1].total);
  container.innerHTML = '';
  sorted.forEach(([name, {si,total}]) => {
    const pct = Math.round(si/total*100);
    const el = document.createElement('div');
    el.className = 'prog-row';
    el.innerHTML = `
      <div class="prog-meta">
        <span class="prog-name">${name}</span>
        <span class="prog-val">${si}/${total} · ${pct}%</span>
      </div>
      <div class="prog-track">
        <div class="prog-bar" style="width:${pct}%; background:${pctColor(pct)};"></div>
      </div>
    `;
    container.appendChild(el);
  });
}

// ── TABLE ─────────────────────────────────────────────────────
function buildSectionFilter() {
  const sel = document.getElementById('secFilter');
  const secs = [...new Set(data.map(r=>r.seccion))].sort();
  secs.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const total = months.filter(m=>r[m]==='SI').length;
    const dotsHtml = months.map(m=>`<div class="dot ${r[m]==='SI'?'dot-si':'dot-no'}"></div>`).join('');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-code">${r.codigo}</td>
      <td class="td-name">${r.nombre}</td>
      <td><span class="td-sec">${r.seccion}</span></td>
      <td class="td-cargo">${r.cargo}</td>
      <td><span class="pill ${r.enero==='SI'?'pill-si':'pill-no'}">${r.enero}</span></td>
      <td><span class="pill ${r.febrero==='SI'?'pill-si':'pill-no'}">${r.febrero}</span></td>
      <td><span class="pill ${r.marzo==='SI'?'pill-si':'pill-no'}">${r.marzo}</span></td>
      <td><span class="pill ${r.abril==='SI'?'pill-si':'pill-no'}">${r.abril}</span></td>
      <td>
        <div style="display:flex;align-items:center;">
          <div class="dots">${dotsHtml}</div>
          <span class="dots-label">${total}/4</span>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('countBadge').textContent = `${rows.length} persona${rows.length!==1?'s':''}`;
}

function filterTable() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const sec  = document.getElementById('secFilter').value;
  const mes  = document.getElementById('mesFilter').value;
  const cum  = document.getElementById('cumFilter').value;

  const filtered = data.filter(r => {
    const matchQ   = !q || r.nombre.toLowerCase().includes(q) || r.seccion.toLowerCase().includes(q) || r.cargo.toLowerCase().includes(q);
    const matchSec = !sec || r.seccion === sec;
    const matchMes = !mes || !cum || r[mes] === cum;
    return matchQ && matchSec && matchMes;
  });
  renderTable(filtered);
}

// ── INIT ──────────────────────────────────────────────────────
buildBarChart();
pctBar(document.getElementById('secList'), data, 'seccion');
pctBar(document.getElementById('cargoList'), data, 'cargo');
buildSectionFilter();
renderTable(data);

// Animate bars after paint
requestAnimationFrame(() => {
  document.querySelectorAll('.prog-bar').forEach(b => {
    const w = b.style.width;
    b.style.width = '0';
    setTimeout(()=>{ b.style.width = w; }, 80);
  });
});
</script>
